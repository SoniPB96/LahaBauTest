<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Laha Baudienstleistungen • Elektro & Baubegleitung</title>
    <meta name="description" content="Elektroarbeiten in Paderborn und Umgebung – realistische Ersteinschätzung, saubere Ausführung und transparente Baubegleitung." />
    <style>
      /* =====  additional micro-interactions & usability refinements ===== */
      *:focus-visible {
        outline: 2px solid rgba(255,255,240,0.75);
        outline-offset: 2px;
        border-radius: 12px;
      }
      .btn:focus-visible, .choice:focus-visible, .input:focus-visible, .step-chip:focus-visible {
        outline: 2px solid #ffffff;
        outline-offset: 2px;
      }
      .choice {
        transition: transform 0.1s ease, background 0.2s, border-color 0.2s;
        cursor: pointer;
      }
      .choice:active { transform: scale(0.98); }
      .input-error {
        border-color: #ff9e8f !important;
        background: rgba(255, 80, 60, 0.08) !important;
        box-shadow: 0 0 0 1px rgba(255, 100, 70, 0.4);
      }
      .error-message {
        font-size: 0.75rem;
        color: #ffb4a2;
        margin-top: 6px;
        letter-spacing: 0.01em;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .wizard-skip-note {
        background: rgba(255,215,140,0.12);
        border-left: 3px solid #ffcd7e;
        border-radius: 18px;
        padding: 14px 18px;
        margin: 16px 0 8px 0;
        font-size: 0.85rem;
        color: #f8e2b0;
      }
      .toast-message {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: #1e1f2c;
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,200,0.2);
        color: #f5f5f5;
        padding: 12px 24px;
        border-radius: 48px;
        font-weight: 500;
        z-index: 200;
        pointer-events: none;
        font-size: 0.85rem;
        box-shadow: 0 12px 28px rgba(0,0,0,0.5);
        animation: fadeSlide 2.2s ease forwards;
      }
      @keyframes fadeSlide {
        0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
        12% { opacity: 1; transform: translateX(-50%) translateY(0); }
        85% { opacity: 1; transform: translateX(-50%) translateY(0); }
        100% { opacity: 0; transform: translateX(-50%) translateY(-8px); visibility: hidden; }
      }
      .wizard-progress-simple {
        display: flex;
        justify-content: space-between;
        margin-top: 8px;
        margin-bottom: 18px;
        gap: 12px;
      }
      .simple-step {
        flex: 1;
        height: 6px;
        background: rgba(255,255,255,0.12);
        border-radius: 20px;
        transition: background 0.2s;
      }
      .simple-step.active {
        background: linear-gradient(90deg, #ffffff, #bdd4ff);
      }
      .contact-demo-btn {
        margin-top: 12px;
        width: 100%;
      }
      .choice-grid .choice {
        text-align: left;
      }
      input[type="number"] {
        -moz-appearance: textfield;
      }
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        opacity: 0.5;
      }
      .sticky-contact {
        transition: transform 0.2s, background 0.2s;
      }
      .sticky-contact:hover {
        transform: scale(1.02);
        background: linear-gradient(180deg, rgba(255,255,255,1), rgba(245,247,255,0.96));
      }
      @media (max-width: 720px) {
        .simple-step { height: 4px; }
        .error-message { font-size: 0.7rem; }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
